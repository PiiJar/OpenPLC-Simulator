server {
    listen 8080;
    server_name _;

    # Palvele frontendin staattiset tiedostot
    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy MATH API-kutsut math-sim-core backendille
    location /api/math/ {
        proxy_pass http://math-sim-core:5001/api/math/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Pidempi timeout optimoinnille (jopa 4 tuntia)
        proxy_connect_timeout 600s;
        proxy_send_timeout 14400s;
        proxy_read_timeout 14400s;
    }

    # Proxy PLC API-kutsut plc-sim-core backendille
    location /api/ {
        proxy_pass http://plc-sim-core:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
