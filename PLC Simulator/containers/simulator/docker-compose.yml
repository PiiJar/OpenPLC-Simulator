
services:
  plc-sim-core:
    image: simulator-plc-sim-core:latest
    build:
      context: ../..
      dockerfile: containers/simulator/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    volumes:
      - ../../sim-core:/app/sim-core
      - ../../visualization:/app/visualization
      - ../../../plant_templates:/app/plant_templates
      - ../../../customers:/app/customers
      - ../../../simulation_results:/data/simulation_results
      - ../../../MATH Simulator/initialization:/data/MATH Simulator/initialization

  math-sim-core:
    image: simulator-math-sim-core:latest
    build:
      context: ../../../MATH Simulator
      dockerfile: ../PLC Simulator/containers/simulator/Dockerfile.math
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - CUSTOMERS_DIR=/data/customers
      - RESULTS_DIR=/data/simulation_results
      - PLANT_TEMPLATES_DIR=/data/plant_templates
    volumes:
      - ../../../MATH Simulator:/app
      - ../../../customers:/data/customers
      - ../../../plant_templates:/data/plant_templates
      - ../../../simulation_results:/data/simulation_results
      - ../../visualization/runtime:/data/runtime

  plc-sim-visu:
    image: simulator-plc-sim-visu:latest
    build:
      context: ../../visualization
      dockerfile: Dockerfile
    # Ei tarvitse mountata kehitysaineistoa tuotantokäytössä

  nginx:
    image: simulator-nginx:latest
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8080:8080"
    volumes:
      - ../../visualization/dist:/usr/share/nginx/html:ro
    depends_on:
      - plc-sim-core
      - plc-sim-visu
      - math-sim-core
