server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # PLC-specific endpoints → gateway container (Modbus bridge)
    location /api/plc/ {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/reset {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/reset-transporters {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/units {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/command/ {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/transporter-states {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/config/ {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/manual-tasks {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/transporter-tasks {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/calibrate/ {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/avoid-statuses {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # All other API calls → simulator container (file services, scheduling, production)
    location /api/ {
        proxy_pass http://simulator:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
