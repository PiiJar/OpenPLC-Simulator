services:
  openplc:
    build: .
    container_name: openplc_v3
    ports:
      - "8080:8080"
    environment:
      - PLC_API_USER=PiiJar
      - PLC_API_PASS=!T0s1v41k33!
    privileged: true
    restart: unless-stopped
    volumes:
      - openplc_data:/home/openplc/OpenPLC_v3/persistent
      - ./openplc/OpenPLC/to_editor/build/plc.st:/home/openplc/plc_program/plc.st:ro

  gateway:
    build: ./openplc/gateway
    container_name: plc_gateway
    ports:
      - "3001:3001"
    environment:
      - PLC_HOST=openplc
      - PLC_PORT=502
      - PLC_API_HOST=openplc
      - PLC_API_PORT=8443
      - PLC_API_USER=PiiJar
      - PLC_API_PASS=!T0s1v41k33!
      - API_PORT=3001
      - POLL_MS=100
      - DB_HOST=plc_db
      - DB_PORT=5432
      - DB_USER=plc
      - DB_PASS=plc_pass
      - DB_NAME=plc_events
      - CUSTOMERS_ROOT=/data/customers
      - PLANT_TEMPLATES_ROOT=/data/plant_templates
      - RUNTIME_ROOT=/data/runtime
    volumes:
      - ./customers:/data/customers
      - ./plant_templates:/data/plant_templates
      - ./runtime:/data/runtime
      - ./PLC Simulator/visualization/public:/app/public:ro
    depends_on:
      - openplc
      - plc_db
    restart: unless-stopped

  plc_db:
    image: postgres:16-alpine
    container_name: plc_db
    environment:
      - POSTGRES_USER=plc
      - POSTGRES_PASSWORD=plc_pass
      - POSTGRES_DB=plc_events
    ports:
      - "5432:5432"
    volumes:
      - plc_db_data:/var/lib/postgresql/data
      - ./openplc/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  visualization:
    build: ./PLC Simulator/visualization
    container_name: plc_ui
    ports:
      - "5173:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  plc_db_data:
  openplc_data:
